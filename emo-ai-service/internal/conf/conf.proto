syntax = "proto3";
package kratos.api;

option go_package = "emo-ai-service/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Auth auth = 3;
  // ai_service configures the downstream FastAPI AI service used by the BFF.
  AIService ai_service = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}

message Auth {
  string jwt_secret = 1;
  google.protobuf.Duration access_token_ttl = 2;
  google.protobuf.Duration refresh_token_ttl = 3;
  string issuer = 4;
}

message AIService {
  // base_url is the FastAPI service root, for example http://127.0.0.1:8000.
  string base_url = 1;
  // timeout applies to normal JSON requests. SSE uses request cancellation instead.
  google.protobuf.Duration timeout = 2;
}
