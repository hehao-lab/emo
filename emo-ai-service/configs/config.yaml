server:
  http:
    network: tcp
    addr: 0.0.0.0:8000
    timeout: 0s
  grpc:
    network: tcp
    addr: 0.0.0.0:9000
    timeout: 30s
data:
  database:
    driver: mysql
    source: ${EMO_DATABASE_SOURCE:root:1234@tcp(120.0.0.13306)/emo_ai?charset=utf8mb4&parseTime=True&loc=Local}
  redis:
    network: tcp
    addr: ${EMO_REDIS_ADDR:127.0.0.1:6379}
    read_timeout: 3s
    write_timeout: 3s
    #password: "123456789"
auth:
  jwt_secret: ${EMO_JWT_SECRET:please-change-this-secret-in-production}
  access_token_ttl: 7200s
  refresh_token_ttl: 2592000s
  issuer: emo-ai-service
ai_service:
  base_url: ${EMO_AI_SERVICE_BASE_URL:http://192.168.31.155:8000}
  timeout: 120s
