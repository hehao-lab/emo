syntax = "proto3";

package user.v1;

option go_package = "emo-ai-service/api/user/v1;v1";

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";

service UserService {
  // Send a registration verification code to an email address.
  rpc SendRegisterEmailCode(SendRegisterEmailCodeRequest) returns (SendRegisterEmailCodeResponse) {
    option (google.api.http) = {
      post: "/v1/users/register/email-code"
      body: "*"
    };
  }

  // Register after verifying the email code.
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/users/register"
      body: "*"
    };
  }

  // Login with phone number and password.
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/users/login"
      body: "*"
    };
  }

  // Get user info by user id.
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse) {
    option (google.api.http) = {
      get: "/v1/users/info"
    };
  }
}

message SendRegisterEmailCodeRequest {
  string email = 1 [(google.api.field_behavior) = REQUIRED];
}

message SendRegisterEmailCodeResponse {
  int64 expires_in = 1;
}

message GetUserInfoRequest {
  int64 user_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetUserInfoResponse {
  int64 user_id = 1;
  string username = 2;
  string avatar = 3;
  repeated string roles = 4;
  string phone = 5;
  string email = 6;
  string address = 7;
  string introduction = 8;
  string gender = 10;
  string birthday = 11;
  string company = 12;
  string position = 13;
  string education = 14;
  string industry = 15;
  string interest = 16;
  string location = 17;
  string language = 18;
  string country = 19;
}

message RegisterRequest {
  string username = 1 [(google.api.field_behavior) = REQUIRED];
  string password = 2 [(google.api.field_behavior) = REQUIRED];
  string phone = 3 [(google.api.field_behavior) = REQUIRED];
  string email = 4 [(google.api.field_behavior) = REQUIRED];
  string verification_code = 5 [(google.api.field_behavior) = REQUIRED];
}

message RegisterResponse {
  int64 user_id = 1;
}

message LoginRequest {
  string phone = 1 [(google.api.field_behavior) = REQUIRED];
  string password = 2 [(google.api.field_behavior) = REQUIRED];
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
  int64 user_id = 4;
  string username = 5;
  string avatar = 6;
  repeated string roles = 7;
}
