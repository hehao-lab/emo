syntax = "proto3";
package user.v1;
option go_package = "emo-ai-service/api/user/v1;v1";

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";

service UserService {
  //注册
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/users/register"
      body: "*"
    };
  }

  // 登录
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/users/login"
      body: "*"
    };
  }

  // 获取用户信息
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse) {
    option (google.api.http) = {
      get: "/v1/users/info"
    };
  }
}
//获取用户信息
message GetUserInfoRequest {
  int64 user_id = 1 [(google.api.field_behavior) = REQUIRED];
}
message GetUserInfoResponse {
  int64 user_id = 1;                                           //用户id
  string username = 2;                                         //用户名
  string avatar = 3;                                           //用户头像
  repeated string roles = 4;                                   //用户角色
  string phone = 5;                                            //手机号
  string email = 6;                                            //邮箱
  string address = 7;                                          //地址
  string introduction = 8;                                     //简介
  string gender = 10;                                          //性别
  string birthday = 11;                                        //生日
  string company = 12;                                         //公司
  string position = 13;                                        //职位
  string education = 14;                                       //教育背景
  string industry = 15;                                        //行业
  string interest = 16;                                        //兴趣
  string location = 17;                                        //位置
  string language = 18;                                        //语言
  string country = 19;                                         //国家
}
//注册
message RegisterRequest {
  string username = 1 [(google.api.field_behavior) = REQUIRED]; // 用户名
  string password = 2 [(google.api.field_behavior) = REQUIRED]; //  密码
  string phone = 3 [(google.api.field_behavior) = REQUIRED]; // 手机号
}
message RegisterResponse {
  int64  user_id = 1;                                           //用户id
}

//登录
message LoginRequest {
  string username = 1 [(google.api.field_behavior) = REQUIRED];  // 用户名
  string password = 2 [(google.api.field_behavior) = REQUIRED];  //  密码
}

message LoginResponse {
  string access_token = 1;                                     //用户登录凭证
  string refresh_token = 2;                                    //刷新登录
  int64 expires_at = 3;                                        //过期时间
  int64 user_id = 4;                                           //用户id
  string username = 5;                                         //用户名
  string avatar = 6;                                           //用户头像
  repeated string roles = 7;                                   //用户角色
}