syntax = "proto3";

package aichat.v1;

option go_package = "emo-ai-service/api/aichat/v1;aichatv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// AIChatService exposes the Kratos BFF contract used by the frontend.
//
// The implementation forwards these requests to the downstream FastAPI AI
// service. The POST SSE endpoint, /api/v1/chat/stream, is registered as a
// native HTTP handler instead of a generated unary RPC so that streaming flush
// behavior stays under explicit control.
service AIChatService {
  // Health proxies the downstream FastAPI health endpoint.
  rpc Health(HealthRequest) returns (HealthReply) {
    option (google.api.http) = {
      get: "/api/v1/health"
    };
  }

  // CreateConversation creates a new conversation for the authenticated user.
  rpc CreateConversation(CreateConversationRequest) returns (Conversation) {
    option (google.api.http) = {
      post: "/api/v1/conversations"
      body: "*"
    };
  }

  // ListConversations returns conversations owned by the authenticated user.
  rpc ListConversations(ListConversationsRequest) returns (ConversationSet) {
    option (google.api.http) = {
      get: "/api/v1/conversations"
    };
  }

  // ListMessages returns messages in one conversation owned by the user.
  rpc ListMessages(ListMessagesRequest) returns (MessageSet) {
    option (google.api.http) = {
      get: "/api/v1/conversations/{conversation_id}/messages"
    };
  }

  // Chat sends a non-streaming chat request and waits for the full AI answer.
  rpc Chat(ChatRequest) returns (ChatReply) {
    option (google.api.http) = {
      post: "/api/v1/chat"
      body: "*"
    };
  }

  // CreateKnowledgeDocument queues an object-storage document for indexing.
  rpc CreateKnowledgeDocument(CreateKnowledgeDocumentRequest) returns (CreateKnowledgeDocumentReply) {
    option (google.api.http) = {
      post: "/api/v1/knowledge/documents"
      body: "*"
    };
  }

  // ListKnowledgeDocuments returns the user's knowledge base documents.
  rpc ListKnowledgeDocuments(ListKnowledgeDocumentsRequest) returns (KnowledgeDocumentSet) {
    option (google.api.http) = {
      get: "/api/v1/knowledge/documents"
    };
  }

  rpc GetKnowledgeDocument(GetKnowledgeDocumentRequest) returns (KnowledgeDocument) {
    option (google.api.http) = {
      get: "/api/v1/knowledge/documents/{document_id}"
    };
  }

  rpc UpdateKnowledgeDocument(UpdateKnowledgeDocumentRequest) returns (KnowledgeDocument) {
    option (google.api.http) = {
      patch: "/api/v1/knowledge/documents/{document_id}"
      body: "*"
    };
  }

  rpc DeleteKnowledgeDocument(DeleteKnowledgeDocumentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/knowledge/documents/{document_id}"
    };
  }

  rpc ReindexKnowledgeDocument(ReindexKnowledgeDocumentRequest) returns (ReindexKnowledgeDocumentReply) {
    option (google.api.http) = {
      post: "/api/v1/knowledge/documents/{document_id}:reindex"
      body: "*"
    };
  }

  rpc GetKnowledgeJob(GetKnowledgeJobRequest) returns (KnowledgeJob) {
    option (google.api.http) = {
      get: "/api/v1/knowledge/jobs/{job_id}"
    };
  }
}

message HealthRequest {}

message HealthReply {
  string status = 1;
}

// Conversation mirrors the FastAPI conversation DTO.
message Conversation {
  string id = 1;
  string title = 2;
  string created_at = 3;
  string updated_at = 4;
}

message ConversationSet {
  repeated Conversation items = 1;
}

// Message mirrors the FastAPI message DTO.
message Message {
  string id = 1;
  string conversation_id = 2;
  string role = 3;
  string content = 4;
  int32 sequence = 5;
  optional string model_name = 6;
  string created_at = 7;
  optional string provider_request_id = 8;
  optional string request_id = 9;
  optional string client_request_id = 10;
  string turn_status = 11;
  string references_json = 12;
  string usage_json = 13;
}

message MessageSet {
  repeated Message items = 1;
}

// KnowledgeDocument mirrors a stored knowledge document summary.
message KnowledgeDocument {
  string id = 1;
  string title = 2;
  optional string source = 3;
  int32 chunk_count = 4;
  string created_at = 5;
  string status = 6;
  int32 progress = 7;
  optional string error_code = 8;
  optional string error_detail = 9;
  int32 index_version = 10;
  optional string embedding_model = 11;
  int32 embedding_dimension = 12;
  string updated_at = 13;
  string metadata_json = 14;
  optional string preview = 15;
  repeated KnowledgeChunk chunks = 16;
}

message KnowledgeDocumentSet {
  repeated KnowledgeDocument items = 1;
  int64 total = 2;
  optional string next_cursor = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message KnowledgeChunk {
  string id = 1;
  string content = 2;
  int32 sequence = 3;
}

message KnowledgeJob {
  string id = 1;
  string document_id = 2;
  string kind = 3;
  string status = 4;
  int32 progress = 5;
  int32 target_index_version = 6;
  optional string error_code = 7;
  optional string error_detail = 8;
  string created_at = 9;
  string updated_at = 10;
}

message CreateConversationRequest {
  string title = 1;
}

message ListConversationsRequest {}

message ListMessagesRequest {
  string conversation_id = 1;
}

// ChatRequest is shared by the streaming and non-streaming chat APIs.
message ChatRequest {
  optional string conversation_id = 1;
  string message = 2;
  optional string system_prompt = 3;
  optional string client_request_id = 4;
}

// ChatReply is returned by the non-streaming chat API after persistence is done.
message ChatReply {
  Conversation conversation = 1;
  Message user_message = 2;
  Message assistant_message = 3;
}

message CreateKnowledgeDocumentRequest {
  string title = 1;
  optional string content = 2;
  optional string source = 3;
  optional string object_reference = 4;
  string metadata_json = 5;
}

message CreateKnowledgeDocumentReply {
  string id = 1;
  string status = 2;
  string job_id = 3;
}

message ListKnowledgeDocumentsRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string status = 3;
  optional string query = 4;
  optional string cursor = 5;
}

message GetKnowledgeDocumentRequest {
  string document_id = 1;
}

message UpdateKnowledgeDocumentRequest {
  string document_id = 1;
  optional string title = 2;
  optional string source = 3;
  optional string metadata_json = 4;
}

message DeleteKnowledgeDocumentRequest {
  string document_id = 1;
}

message ReindexKnowledgeDocumentRequest {
  string document_id = 1;
}

message ReindexKnowledgeDocumentReply {
  string job_id = 1;
  string status = 2;
}

message GetKnowledgeJobRequest {
  string job_id = 1;
}
