tags:
    - name: AIChatService
      description: |-
        AIChatService exposes the Kratos BFF contract used by the frontend.

         The implementation forwards these requests to the downstream FastAPI AI
         service. The POST SSE endpoint, /api/v1/chat/stream, is registered as a
         native HTTP handler instead of a generated unary RPC so that streaming flush
         behavior stays under explicit control.
    - name: AdminService
    - name: ChatService
    - name: DiaryService
    - name: EmotionService
    - name: FileService
    - name: ProfileService
    - name: SecurityService
    - name: SystemService
    - name: UserService
